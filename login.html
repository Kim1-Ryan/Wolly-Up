<!--
This page handles user authentication. 
Once a user successfully logs in, it securely redirects them back to your main application page.
-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marketplace - Client Login</title>

    <style>
        
        body { 
            font-family: sans-serif; 
            max-width: 400px; 
            margin: 80px auto; 
            padding: 20px; 
            background: #f9f9f9; 
        }
        
        .box { 
            background: white; 
            border: 1px solid #ddd; 
            padding: 30px; 
            border-radius: 8px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); 
        }
        
        .form-group { 
            margin-bottom: 15px; 
        }
        
        label { 
            display: block; 
            margin-bottom: 5px; 
            font-weight: bold; 
        }
        
        input { 
            width: 100%; 
            padding: 10px; 
            box-sizing: border-box; 
            border: 1px solid #ccc; 
            border-radius: 4px; 
        }
        
        button { 
            background: #10a37f; 
            color: white; 
            border: none; 
            padding: 12px; 
            cursor: pointer; 
            width: 100%; 
            border-radius: 4px; 
            font-weight: bold; 
            font-size: 1rem; 
        }
        
        #message { 
            margin-top: 15px; 
            font-weight: bold; 
            text-align: center; 
            font-size: 0.9rem; 
        }

    </style>

</head>
<body>
    
    <div class="box">
        
        <h2>Client Dashboard Login</h2>
        
        <form id="loginForm">
            
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" required>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" required>
            </div>

            <button type="submit">Log In</button>

        </form>

        <div id="message"></div>

    </div>



    <script src="https://jsdelivr.net"></script>


    <script>

        // CONFIGURATION: Replace with your actual credentials
        const SUPABASE_URL = "https://supabase.co"; 
        const SUPABASE_ANON_KEY = "your-anon-public-api-key-here";
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const messageDiv = document.getElementById('message');
            messageDiv.style.color = "black";
            messageDiv.textContent = "Verifying credentials...";

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            // Attempt session login via password
            const { data, error } = await supabase.auth.signInWithPassword({ email, password });

            if (error) {
                messageDiv.style.color = "red";
                messageDiv.textContent = error.message;
            } else {
                messageDiv.style.color = "green";
                messageDiv.textContent = "Login verified! Redirecting...";
                
                // Securely forward the authenticated user back to the primary marketplace page
                setTimeout(() => {
                    window.location.href = "index.html";
                }, 1000);
            }
        });

    </script>

</body>
</html>
