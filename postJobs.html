<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post Job to Supabase</title>

    <style>

        body { 
            font-family: sans-serif; 
            max-width: 400px; 
            margin: 40px auto; 
            padding: 20px; 
        }
        
        .form-group { 
            margin-bottom: 15px; 
        }
        
        label { 
            display: block; 
            margin-bottom: 5px; 
            font-weight: bold; 
        }
        
        input, textarea { 
            width: 100%; 
            padding: 8px; 
            box-sizing: border-box; 
            border: 1px solid #ccc; 
            border-radius: 4px; 
        }
        
        button { 
            background: #10a37f; 
            color: white; 
            border: none; 
            padding: 10px 15px; 
            cursor: pointer; 
            width: 100%; 
            font-weight: bold; 
            border-radius: 4px; }
        
        #message { 
            margin-top: 15px; 
            font-weight: bold; 
        }
        
        .locked-msg { 
            color: #cc0000; 
            font-weight: bold; 
            margin-bottom: 15px; 
            text-align: center; 
        }
        
        .hidden { 
            display: none; 
        }

    </style>

</head>
<body>

    <h2>Post a New Job</h2>

    <!-- Visual Warning displayed if the freelancer/client is logged out -->
    <div id="lockMessage" class="locked-msg">
        ⚠️ Access Denied: You must be logged in to post a job.
    </div>
    
    <!-- The modified form, hidden completely until user verification passes -->
    <form id="jobForm" class="hidden">
        
        <div class="form-group">
            <label for="title">Job Title</label>
            <input type="text" id="title" required>
        </div>
        
        <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" rows="4" required></textarea>
        </div>
        
        <div class="form-group">
            <label for="budget">Budget ($)</label>
            <input type="number" id="budget" required>
        </div>

        <button type="submit">Publish to Supabase SQL</button>

    </form>
    

    <div id="message"></div>



    <!-- 1. Import the Supabase JS Library from CDN -->
    <script src="https://jsdelivr.net"></script>


    <script>

        // 2. CONFIGURATION: Paste your actual Supabase credentials here
        const SUPABASE_URL = "https://supabase.co"; 
        const SUPABASE_ANON_KEY = "your-anon-public-api-key-here";
        
        // Initialize the browser connection to your cloud database
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const jobForm = document.getElementById('jobForm');
        const lockMessage = document.getElementById('lockMessage');
        const messageDiv = document.getElementById('message');

        // 3. SECURITY CHECK: Monitor the user's active session state
        supabase.auth.onAuthStateChange((event, session) => {
            if (session && session.user) {
                // User is authenticated -> Show the form, hide the warning
                lockMessage.classList.add('hidden');
                jobForm.classList.remove('hidden');
            } else {
                // User is logged out -> Lock out the form interface
                lockMessage.classList.remove('hidden');
                jobForm.classList.add('hidden');
                messageDiv.textContent = "";
            }
        });

        // 4. SUBMISSION LOGIC: Connect the form submission event listener directly to SQL
        jobForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            messageDiv.style.color = "black";
            messageDiv.textContent = "Publishing to marketplace database...";

            // Gather inputs from the DOM
            const titleValue = document.getElementById('title').value;
            const descriptionValue = document.getElementById('description').value;
            const budgetValue = document.getElementById('budget').value;

            try {
                // Use the Supabase JavaScript SDK to issue an INSERT command directly
                // Supabase automatically injects the logged-in user's token credentials in the header
                const { data, error } = await supabase
                    .from('jobs')
                    .insert([
                        { 
                            title: titleValue, 
                            description: descriptionValue, 
                            budget: parseInt(budgetValue) 
                        }
                    ]);

                // Check if the Postgres database rejected the write rule (due to RLS or bad data)
                if (error) throw error;

                // Success response updates
                messageDiv.style.color = "green";
                messageDiv.textContent = "Success! Job has been saved safely to PostgreSQL.";
                jobForm.reset();

            } catch (err) {
                // Error catching block
                messageDiv.style.color = "red";
                messageDiv.textContent = `Database Error: ${err.message}`;
                console.error("Submission failed:", err);
            }
        });

    </script>


</body>
</html>
